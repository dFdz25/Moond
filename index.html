<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rest & Mood Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        moon: {
                            light: '#E2D4FF',
                            base: '#C4B5FD',
                            dark: '#8B5CF6',
                            bg: '#121212',
                            card: '#1E1E1E',
                            section: '#2A2A2A',
                            border: '#3A3A3A'
                        },
                        sun: {
                            bg: '#F3F4F6',
                            card: '#FFFFFF',
                            section: '#F9FAFB',
                            border: '#E5E7EB'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        input[type="time"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        .dark input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
        input[type="time"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
        /* Ocultar barra de scroll para el diseño limpio */
        body::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-sun-bg dark:bg-moon-bg transition-colors duration-500 min-h-screen flex items-center justify-center font-sans text-gray-900 dark:text-white relative py-10">

    <!-- Botón para cambiar tema -->
    <button id="themeToggle" class="absolute top-6 right-6 flex items-center gap-2 bg-white dark:bg-[#2A2A2A] border-2 border-sun-border dark:border-moon-border p-2 rounded-2xl shadow-lg hover:scale-105 transition-all duration-300 z-40 group">
        <!-- Icono Luna -->
        <div class="w-8 h-8 rounded-xl flex items-center justify-center transition-colors duration-300 bg-gray-100 dark:bg-transparent dark:text-gray-400 text-gray-800 group-hover:bg-gray-200 dark:group-hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </div>
        <!-- Icono Sol -->
        <div class="w-8 h-8 rounded-xl flex items-center justify-center transition-colors duration-300 dark:bg-[#3A3A3A] dark:text-white text-gray-400 bg-transparent group-hover:text-gray-800 dark:group-hover:bg-[#4A4A4A]">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </div>
    </button>

    <!-- Tarjeta Principal -->
    <div class="bg-sun-card dark:bg-moon-card w-[380px] rounded-[2.5rem] border-2 border-sun-border dark:border-moon-border p-8 shadow-2xl transition-colors duration-500 z-10 relative overflow-hidden flex flex-col gap-6">
        <!-- Fondo brillo decorativo -->
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-moon-base/20 blur-3xl rounded-full pointer-events-none hidden dark:block"></div>

        <!-- Encabezado con Logo -->
        <div class="flex items-center gap-5">
            <div id="dynamic-logo" class="w-16 h-16 flex-shrink-0 relative">
                <!-- Logo Luna -->
                <svg id="moon-logo" class="absolute inset-0 w-full h-full drop-shadow-[0_4px_12px_rgba(196,181,253,0.3)] block dark:block hidden" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 15 A 35 35 0 1 0 85 50 A 25 25 0 0 1 50 15 Z" fill="#C4B5FD" stroke="#7C3AED" stroke-width="3" stroke-linejoin="round"/>
                    <path d="M35 55 Q 40 60 45 55" fill="none" stroke="#4C1D95" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M55 55 Q 60 60 65 55" fill="none" stroke="#4C1D95" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M48 65 Q 50 67 52 65" fill="none" stroke="#4C1D95" stroke-width="2" stroke-linecap="round"/>
                    <path d="M20 30 L 25 35 L 20 40 L 15 35 Z" fill="#E2D4FF"/>
                    <path d="M80 30 L 83 35 L 80 40 L 77 35 Z" fill="#E2D4FF"/>
                </svg>

                <!-- Logo Sol -->
                <svg id="sun-logo" class="absolute inset-0 w-full h-full drop-shadow-sm hidden dark:hidden block" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <line x1="50" y1="5" x2="50" y2="15" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
                    <line x1="50" y1="85" x2="50" y2="95" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
                    <line x1="5" y1="50" x2="15" y2="50" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
                    <line x1="85" y1="50" x2="95" y2="50" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
                    <line x1="18" y1="18" x2="25" y2="25" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
                    <line x1="82" y1="82" x2="75" y2="75" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
                    <line x1="18" y1="82" x2="25" y2="75" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
                    <line x1="82" y1="18" x2="75" y2="25" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="28" fill="#F9FAFB" stroke="#6B7280" stroke-width="3"/>
                    <path d="M38 48 Q 43 53 48 48" fill="none" stroke="#4B5563" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M52 48 Q 57 53 62 48" fill="none" stroke="#4B5563" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M48 58 Q 50 60 52 58" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <div>
                <h2 class="font-extrabold text-2xl tracking-tight leading-tight">Sleep & Mood</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">Daily Tracker</p>
            </div>
        </div>

        <!-- Sección Bedtime -->
        <div class="bg-sun-section dark:bg-moon-section rounded-[1.5rem] p-6 border border-sun-border dark:border-moon-border transition-colors duration-500">
            <div class="inline-block px-3 py-1 mb-4 bg-gray-200 dark:bg-moon-border rounded-lg">
                <h3 class="font-bold text-xs uppercase tracking-widest text-gray-700 dark:text-moon-light">Bedtime</h3>
            </div>
            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Sleep Time</label>
                <input type="time" id="sleepTime" class="w-full bg-white dark:bg-[#1A1A1A] text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-gray-400 dark:focus:border-moon-base shadow-sm transition-all text-lg font-medium" />
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Wake Time</label>
                <input type="time" id="wakeTime" class="w-full bg-white dark:bg-[#1A1A1A] text-gray-900 dark:text-white border-2 border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-gray-400 dark:focus:border-moon-base shadow-sm transition-all text-lg font-medium" />
            </div>
        </div>

        <!-- Sección Mood -->
        <div class="bg-sun-section dark:bg-moon-section rounded-[1.5rem] p-6 border border-sun-border dark:border-moon-border transition-colors duration-500">
            <div class="inline-block px-3 py-1 mb-4 bg-gray-200 dark:bg-moon-border rounded-lg">
                <h3 class="font-bold text-xs uppercase tracking-widest text-gray-700 dark:text-moon-light">Mood</h3>
            </div>
            <div class="flex justify-between items-center gap-3">
                <button class="mood-btn w-14 h-14 rounded-[1rem] flex items-center justify-center text-2xl bg-white dark:bg-[#1A1A1A] border-2 border-gray-200 dark:border-gray-700 shadow-sm hover:scale-110 hover:border-gray-400 dark:hover:border-moon-base transition-all duration-300 focus:outline-none" data-mood="happy">:)</button>
                <button class="mood-btn w-14 h-14 rounded-[1rem] flex items-center justify-center text-2xl bg-white dark:bg-[#1A1A1A] border-2 border-gray-200 dark:border-gray-700 shadow-sm hover:scale-110 hover:border-gray-400 dark:hover:border-moon-base transition-all duration-300 focus:outline-none" data-mood="okay">:|</button>
                <button class="mood-btn w-14 h-14 rounded-[1rem] flex items-center justify-center text-2xl bg-white dark:bg-[#1A1A1A] border-2 border-gray-200 dark:border-gray-700 shadow-sm hover:scale-110 hover:border-gray-400 dark:hover:border-moon-base transition-all duration-300 focus:outline-none" data-mood="stressed">:/</button>
                <button class="mood-btn w-14 h-14 rounded-[1rem] flex items-center justify-center text-2xl bg-white dark:bg-[#1A1A1A] border-2 border-gray-200 dark:border-gray-700 shadow-sm hover:scale-110 hover:border-gray-400 dark:hover:border-moon-base transition-all duration-300 focus:outline-none" data-mood="tired">:(</button>
            </div>
        </div>

        <!-- Historial semanal -->
        <div class="pt-2">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-sm text-gray-500 dark:text-gray-400">Weekly History</h3>
                <span class="text-xs font-semibold text-gray-400" id="weeklyAvg">Avg: -- h</span>
            </div>
            <div class="flex justify-between items-end h-28 gap-2" id="weeklyChart"></div>
        </div>
    </div>

    <!-- Pantalla de consejos -->
    <div id="adviceScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-white dark:bg-[#0A0A0A] opacity-0 pointer-events-none transition-all duration-700 ease-out transform scale-105">
        <div class="w-full h-full max-w-4xl p-8 md:p-16 flex flex-col justify-center relative overflow-hidden">
            <!-- Círculos de luz -->
            <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-moon-base/10 dark:bg-moon-base/5 rounded-full blur-[100px] pointer-events-none -translate-x-1/2 -translate-y-1/2"></div>
            <div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-blue-400/10 dark:bg-blue-900/10 rounded-full blur-[100px] pointer-events-none translate-x-1/3 translate-y-1/3"></div>

            <!-- Etiqueta superior -->
            <div class="inline-flex px-4 py-2 mb-10 bg-gray-100 dark:bg-moon-section rounded-2xl self-start border border-gray-200 dark:border-moon-border">
                <span class="text-sm font-bold uppercase tracking-widest text-gray-800 dark:text-moon-light flex items-center gap-3">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    Your Daily Insight
                </span>
            </div>

            <!-- Texto principal -->
            <h2 class="text-5xl md:text-7xl font-extrabold mb-8 tracking-tighter text-gray-900 dark:text-white leading-[1.1]">
                Hello there,
            </h2>
            <p id="adviceText" class="text-2xl md:text-4xl text-gray-600 dark:text-gray-300 leading-snug font-medium mb-16 relative z-10 max-w-3xl"></p>
            <!-- Botón -->
            <button id="closeBtn" class="self-start bg-gray-900 text-white dark:bg-white dark:text-black font-extrabold text-xl py-5 px-10 rounded-3xl hover:scale-105 hover:shadow-2xl dark:hover:shadow-[0_0_30px_rgba(255,255,255,0.3)] transition-all duration-300 relative z-10 flex items-center gap-3">
                Save & Continue
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
